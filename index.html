<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift?</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.box{
    text-align:center;
}

h1{
    font-size:35px;
    margin-bottom:30px;
}

button{
    padding:15px 35px;
    font-size:22px;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
    margin:10px;
}

.yes{
    background:green;
}

.no{
    background:red;
}

#emoji{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    pointer-events:none;
    font-size:35px;
}
</style>
</head>

<body>

<div class="box">
    <h1>🎁 Do you want a gift?</h1>

    <button class="yes" onclick="gift()">YES</button>
    <button class="no" onclick="gift()">YES</button>
</div>

<div id="emoji"></div>

<script>
function gift(){
    pop up("❌ oru kindiyum ila 😂😂😂");

    let area=document.getElementById("emoji");

    for(let i=0;i<80;i++){
        let e=document.createElement("div");
        e.innerHTML="😂";
        e.style.position="absolute";
        e.style.left=Math.random()*100+"%";
        e.style.top=Math.random()*100+"%";
        e.style.fontSize=(20+Math.random()*40)+"px";
        area.appendChild(e);

        setTimeout(()=>{
            e.remove();
        },2500);
    }
}
</script>

</body>
</html>
